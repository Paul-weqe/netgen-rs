kinds:
  holo:
    volumes:
      - tmp/src: /tmp/holo
    scripts:
      - ./holo.sh

  frr:
    volumes:
      - tmp/src: /tmp/frr
    scripts:
      - ./frr.sh


routers:
  rt1:
    kind: holo
    interfaces:
      lo: [ 1.1.1.1/32 ]
      eth-sw1: [ 10.0.1.1/24 ]

  rt2:
    kind: frr
    interfaces:
      lo: [ 2.2.2.2/32 ]
      eth-sw1: [ 10.0.1.2/24 ]

  # A router can also run without a kind. You can define everything
  # manually.
  rt3:
    interfaces:
      lo: [ 3.3.3.3/32 ]
      eth-sw1: [ 10.0.1.3/24 ]
    volumes:
      - tmp/src: /tmp/dst

switches:
  sw1:
    interfaces:
      lo:
        - 5.5.5.5/32

links:
  - src-device: rt1
    src-iface: eth-sw1
    dst-device: sw1
    dst-iface: eth-rt1

  - src-device: rt2
    src-iface: eth-sw1
    dst-device: sw1
    dst-iface: eth-rt2

  - src-device: rt3
    src-iface: eth-sw1
    dst-device: sw1
    dst-iface: eth-rt3

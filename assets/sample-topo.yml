routers:
  rt1:
    interfaces:
      lo: [ 1.1.1.1/32 ]
      eth-sw1: [ 10.0.1.1/24 ]
    volumes:
      - tmp/src/:tmp/dst

  rt2:
    interfaces:
      lo: [ 2.2.2.2/32 ]
      eth-sw1: [ 10.0.1.2/24 ]

  rt3:
    interfaces:
      lo: [ 3.3.3.3/32 ]
      eth-sw1: [ 10.0.1.3/24 ]

switches:
  sw1:
    interfaces:
      lo:
        - 5.5.5.5/32

links:
  - src-device: rt1
    src-iface: eth-sw1
    dst-device: sw1
    dst-iface: eth-rt1

  - src-device: rt2
    src-iface: eth-sw1
    dst-device: sw1
    dst-iface: eth-rt2

  - src-device: rt3
    src-iface: eth-sw1
    dst-device: sw1
    dst-iface: eth-rt3 
